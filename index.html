<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison 3D V5+</title>
<style>
body{margin:0;font-family:sans-serif;background:#fff;}
#menu{padding:20px;text-align:center}
button{padding:10px 15px;border-radius:10px;border:none;margin:5px}
#game{display:none;height:100vh;overflow:hidden;position:relative;background:#eee}
#room{width:2000px;height:2000px;position:absolute;background:linear-gradient(#fff,#ddd)}
.decor{position:absolute;font-size:30px;cursor:move}
#toolbar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:10px;display:flex;overflow:auto}
</style>
</head>
<body>

<div id="menu">
<h1>🏡 Mon jeu maison</h1>
<button onclick="enterHouse()">Entrer dans la maison</button>
</div>

<div id="game">
<div id="room"></div>
<div id="toolbar"></div>
</div>

<script>
const room=document.getElementById("room")
const toolbar=document.getElementById("toolbar")

const objects=[
"🛋️","🪑","🛏️","🪴","🪟","💡","🧸","🖼️","🧺","🪞"
]

objects.forEach((obj)=>{
 let btn=document.createElement("button")
 btn.innerText=obj
 btn.onclick=()=>addObject(obj)
 toolbar.appendChild(btn)
})

function enterHouse(){
 document.getElementById("menu").style.display="none"
 document.getElementById("game").style.display="block"
}

function addObject(icon){
 let el=document.createElement("div")
 el.className="decor"
 el.innerText=icon
 el.style.left="100px"
 el.style.top="100px"
 room.appendChild(el)
 drag(el)
}

function drag(el){
 let offsetX,offsetY
 el.onmousedown=(e)=>{
  offsetX=e.offsetX
  offsetY=e.offsetY
  document.onmousemove=(ev)=>{
    el.style.left=(ev.pageX-offsetX)+"px"
    el.style.top=(ev.pageY-offsetY)+"px"
  }
  document.onmouseup=()=>document.onmousemove=null
 }
}
</script>

</body>
</html>
