<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison V7</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5}

/* MENU */
#menu{text-align:center;padding:30px}
button{padding:10px;border-radius:10px;border:none;margin:5px}

/* GAME */
#game{display:none;height:100vh;overflow:hidden;position:relative}

/* WORLD */
#world{
 width:1200px;height:800px;
 position:absolute;
 background:#ddd;
}

/* PLAYER */
#player{
 width:40px;height:40px;
 background:#3498db;
 position:absolute;
 border-radius:10px;
}

/* OBJECTS (now REAL blocks, not emoji) */
.object{
 width:50px;height:50px;
 position:absolute;
 border-radius:8px;
 background:#8e44ad;
}

/* DIFFERENT OBJECT TYPES */
.chair{background:#b5651d}
.bed{background:#d35400;width:80px;height:50px}
.table{background:#7f8c8d}
.plant{background:#27ae60;border-radius:50%}
.lamp{background:#f1c40f}

/* LEVEL PANEL SCROLLABLE */
#levels{
 position:absolute;
 right:0;top:0;
 width:120px;height:100%;
 overflow-y:auto;
 background:#fff;
}

.level{
 padding:10px;
 border-bottom:1px solid #ccc;
 cursor:pointer;
}

/* SHOP */
#shop{
 position:absolute;
 bottom:0;left:0;right:120px;
 background:#fff;
 display:flex;
 overflow-x:auto;
}

.shop-item{
 min-width:100px;
 padding:10px;
 border-right:1px solid #eee;
}

</style>
</head>

<body>

<div id="menu">
<h1>🏡 Jeu Maison V7</h1>
<button onclick="start()">Entrer dans la maison</button>
</div>

<div id="game">

<div id="world">
<div id="player"></div>
</div>

<div id="levels"></div>
<div id="shop"></div>

</div>

<script>

/* PLAYER */
let player={x:200,y:200}
let speed=5

function updatePlayer(){
 let p=document.getElementById("player")
 p.style.left=player.x+"px"
 p.style.top=player.y+"px"
}

/* MOVE */
document.addEventListener("keydown",(e)=>{
 if(e.key==="ArrowUp")player.y-=speed
 if(e.key==="ArrowDown")player.y+=speed
 if(e.key==="ArrowLeft")player.x-=speed
 if(e.key==="ArrowRight")player.x+=speed
 updatePlayer()
})

/* OBJECTS */
let objects=[
 {type:"chair"},
 {type:"bed"},
 {type:"table"},
 {type:"plant"},
 {type:"lamp"}
]

/* SHOP */
function renderShop(){
 let shop=document.getElementById("shop")
 shop.innerHTML=""
 objects.forEach(obj=>{
  let div=document.createElement("div")
  div.className="shop-item"
  div.innerHTML="<button>Placer</button>"
  div.onclick=()=>placeObject(obj.type)
  shop.appendChild(div)
 })
}

/* PLACE OBJECT */
function placeObject(type){
 let el=document.createElement("div")
 el.className="object "+type
 el.style.left=player.x+"px"
 el.style.top=player.y+"px"
 document.getElementById("world").appendChild(el)
}

/* LEVELS SCROLL */
function renderLevels(){
 let levels=document.getElementById("levels")
 for(let i=1;i<=20;i++){
  let div=document.createElement("div")
  div.className="level"
  div.innerText="Niveau "+i
  div.onclick=()=>alert("Mini jeu niveau "+i)
  levels.appendChild(div)
 }
}

/* START */
function start(){
 document.getElementById("menu").style.display="none"
 document.getElementById("game").style.display="block"
 updatePlayer()
 renderShop()
 renderLevels()
}

</script>

</body>
</html>
